# Shiny Server configuration for LipidSig 2.0
run_as shiny;

server {
  listen 3838;

  # Serve the integrated app at the root URL  (http://host:3838/)
  location / {
    app_dir /srv/shiny-server/lipidsig;
    log_dir /var/log/shiny-server;
    # Increase timeouts for heavy analyses (ML, Network, etc.)
    app_init_timeout   300;
    app_idle_timeout   120;
  }
}
